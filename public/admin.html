<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 答题冒险</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Home ───────────────────────────────────────────────────────────────── -->
<div id="view-home" class="view active center">
  <div style="width:100%;max-width:400px">
    <div class="text-center mb-8">
      <div class="logo">管理<span>后台</span></div>
      <div class="text-muted text-sm">答题冒险游戏</div>
    </div>

    <!-- Tab: create or login -->
    <div class="card mt-16">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchHomeTab('create', this)">创建新房间</button>
        <button class="tab-btn" onclick="switchHomeTab('login', this)">进入已有房间</button>
      </div>

      <!-- Create -->
      <div id="home-tab-create" class="tab-panel active">
        <div id="create-error" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label>管理员密码</label>
          <input id="c-password" type="password" placeholder="设置管理员密码">
        </div>
        <div class="form-group">
          <label>棋盘格子数（10-100）</label>
          <input id="c-board" type="number" value="30" min="10" max="100">
        </div>
        <div class="form-group">
          <label>每题答题时限（秒，5-120）</label>
          <input id="c-time" type="number" value="30" min="5" max="120">
        </div>
        <div class="form-group">
          <label>几人到达终点后提示可结束</label>
          <input id="c-min" type="number" value="3" min="1" max="100">
        </div>
        <button class="btn btn-primary btn-full mt-12" onclick="doCreate()">创建房间</button>
      </div>

      <!-- Login -->
      <div id="home-tab-login" class="tab-panel">
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label>房间号</label>
          <input id="l-room" placeholder="输入6位房间号" maxlength="6" style="text-transform:uppercase;letter-spacing:0.1em">
        </div>
        <div class="form-group">
          <label>管理员密码</label>
          <input id="l-password" type="password" placeholder="输入管理员密码">
        </div>
        <button class="btn btn-primary btn-full mt-12" onclick="doLogin()">进入房间</button>
      </div>
    </div>

    <div class="text-center mt-12 text-sm text-muted">
      <a href="index.html" style="color:var(--primary);text-decoration:none">← 玩家入口</a>
    </div>
  </div>
</div>

<!-- ── Setup ───────────────────────────────────────────────────────────────── -->
<div id="view-setup" class="view">
  <div class="admin-header">
    <div>
      <div class="header-title">房间设置</div>
      <div class="header-sub" id="setup-room-info"></div>
    </div>
    <div class="header-right">
      <div class="room-id-badge" id="setup-room-badge"></div>
      <button class="btn btn-success" onclick="doStartGame()" id="btn-start">开始游戏</button>
    </div>
  </div>

  <div class="container" style="padding-top:20px">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchSetupTab('questions', this)">题库管理</button>
      <button class="tab-btn" onclick="switchSetupTab('surprise', this)">惊喜格设置</button>
      <button class="tab-btn" onclick="switchSetupTab('settings', this)">房间设置</button>
    </div>

    <!-- Questions tab -->
    <div id="setup-tab-questions" class="tab-panel active">
      <div class="card mb-8" id="add-q-card">
        <div class="card-title">添加题目</div>
        <div id="add-q-error" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label>题目内容</label>
          <textarea id="q-text-input" placeholder="输入题目内容"></textarea>
        </div>
        <div id="q-options-inputs">
          <div class="form-group">
            <label>选项 A</label>
            <input class="q-opt" placeholder="选项A内容">
          </div>
          <div class="form-group">
            <label>选项 B</label>
            <input class="q-opt" placeholder="选项B内容">
          </div>
          <div class="form-group">
            <label>选项 C（可选）</label>
            <input class="q-opt" placeholder="选项C内容（留空则不添加）">
          </div>
          <div class="form-group">
            <label>选项 D（可选）</label>
            <input class="q-opt" placeholder="选项D内容（留空则不添加）">
          </div>
        </div>
        <div class="form-group">
          <label>正确答案</label>
          <select id="q-correct">
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="doAddQuestion()">添加到题库</button>
      </div>

      <div id="add-q-success" class="alert alert-success" style="display:none"></div>

      <div class="card">
        <div class="flex items-center justify-between mb-8">
          <div class="card-title" style="margin-bottom:0">已有题目 <span id="q-count" class="text-muted text-sm">(0题)</span></div>
        </div>
        <div id="question-list"></div>
      </div>
    </div>

    <!-- Surprise tab -->
    <div id="setup-tab-surprise" class="tab-panel">
      <div class="card">
        <div class="card-title">惊喜格设置</div>
        <div class="text-muted text-sm mb-8">输入格子编号（1 到 棋盘格数-1），玩家踩到后获得惊喜记录。</div>
        <div id="surprise-error" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label>添加惊喜格（输入编号）</label>
          <div class="gap-8">
            <input id="surprise-inp" type="number" placeholder="格子编号" min="1" style="flex:1">
            <button class="btn btn-success" onclick="doAddSurprise()">添加</button>
          </div>
        </div>
        <div id="surprise-list" class="surprise-grid"></div>
        <div class="text-muted text-sm mt-8">点击格子编号可删除</div>
      </div>
    </div>

    <!-- Settings tab -->
    <div id="setup-tab-settings" class="tab-panel">
      <div class="card">
        <div class="card-title">修改房间设置</div>
        <div id="settings-msg" style="display:none"></div>
        <div class="form-group">
          <label>棋盘格子数（10-100）</label>
          <input id="s-board" type="number" min="10" max="100">
        </div>
        <div class="form-group">
          <label>每题答题时限（秒）</label>
          <input id="s-time" type="number" min="5" max="120">
        </div>
        <div class="form-group">
          <label>几人到达终点后提示可结束</label>
          <input id="s-min" type="number" min="1" max="100">
        </div>
        <button class="btn btn-primary" onclick="doSaveSettings()">保存设置</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Monitor (playing) ──────────────────────────────────────────────────── -->
<div id="view-monitor" class="view">
  <div class="admin-header">
    <div>
      <div class="header-title">游戏进行中</div>
      <div class="header-sub" id="monitor-info"></div>
    </div>
    <div class="header-right">
      <div class="room-id-badge" id="monitor-room-badge"></div>
      <button class="btn btn-danger" id="btn-end" onclick="doEndGame()">结束游戏</button>
    </div>
  </div>

  <div class="container" style="padding-top:20px">
    <div id="can-end-alert" class="alert alert-info" style="display:none"></div>

    <div class="card mb-8">
      <div class="flex items-center justify-between mb-8">
        <div class="card-title" style="margin-bottom:0">玩家进度</div>
        <span class="text-muted text-sm" id="monitor-round">第 0 题</span>
      </div>
      <div id="player-monitor-list"></div>
    </div>

    <div class="card">
      <div class="card-title">当前排行（实时）</div>
      <div id="monitor-leaderboard" class="leaderboard"></div>
    </div>
  </div>
</div>

<!-- ── Game Ended ─────────────────────────────────────────────────────────── -->
<div id="view-ended" class="view center">
  <div style="width:100%;max-width:480px">
    <div class="text-center mb-8">
      <div style="font-size:2.5rem">🏆</div>
      <div class="logo">游戏结束</div>
    </div>
    <div id="admin-final-lb" class="leaderboard"></div>
    <button class="btn btn-ghost btn-full mt-16" onclick="location.reload()">创建新房间</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="admin.js"></script>
</body>
</html>
