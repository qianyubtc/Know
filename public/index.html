<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>答题大冒险</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Join ───────────────────────────────────────────────────────────────── -->
<div id="view-join" class="view active center">
  <div style="width:100%;max-width:380px">
    <div class="text-center mb-8">
      <div class="logo">答题<span>冒险</span></div>
      <div class="text-muted text-sm">加入房间，开始答题闯关</div>
    </div>
    <div class="card mt-16">
      <div id="join-error" class="alert alert-error" style="display:none"></div>
      <div class="form-group">
        <label>房间号</label>
        <input id="inp-room" placeholder="输入6位房间号" maxlength="6" style="text-transform:uppercase;letter-spacing:0.1em;font-size:1.1rem">
      </div>
      <div class="form-group">
        <label>你的ID</label>
        <input id="inp-player" placeholder="给自己起个ID（2-12字符）" maxlength="12">
      </div>
      <div class="form-group">
        <label>6位密码（下次重连用）</label>
        <input id="inp-password" type="password" placeholder="设置6位数字密码" maxlength="6" pattern="\d{6}" inputmode="numeric">
      </div>
      <button class="btn btn-primary btn-full mt-12" onclick="doJoin()">加入游戏</button>
    </div>
    <div class="text-center mt-12 text-sm text-muted">
      管理员？<a href="admin.html" style="color:var(--primary);text-decoration:none">点此进入管理后台</a>
    </div>
  </div>
</div>

<!-- ── Waiting ─────────────────────────────────────────────────────────────── -->
<div id="view-waiting" class="view">
  <div class="header">
    <div>
      <div class="header-title">等待游戏开始</div>
      <div class="header-sub" id="wait-room-info"></div>
    </div>
    <div class="header-right">
      <span class="pulse text-muted text-sm">等待管理员开始游戏…</span>
    </div>
  </div>
  <div class="container" style="padding-top:24px">
    <div class="card">
      <div class="card-title">已加入玩家</div>
      <div id="wait-player-list" class="player-list"></div>
    </div>
  </div>
</div>

<!-- ── Game ────────────────────────────────────────────────────────────────── -->
<div id="view-game" class="view">
  <div class="header">
    <div>
      <div class="header-title" id="game-room-title">答题冒险</div>
      <div class="header-sub" id="game-round-info">第 1 题</div>
    </div>
    <div class="header-right">
      <span id="my-pos-badge" class="text-sm text-muted"></span>
    </div>
  </div>

  <div class="game-layout">
    <!-- Left: board + question -->
    <div class="game-left">
      <!-- My finished banner (hidden by default) -->
      <div id="finished-banner" class="finished-banner" style="display:none">
        <div class="rank" id="my-rank-num">🏆</div>
        <div style="font-size:1rem;font-weight:700">你已到达终点！</div>
        <div class="text-muted text-sm mt-8">等待游戏结束，查看最终排行</div>
      </div>

      <!-- Question -->
      <div id="question-area" class="question-card mb-8" style="display:none">
        <div class="question-header">
          <span class="round-badge" id="q-round-badge">第 1 题</span>
          <div class="timer-ring">
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle class="timer-bg" cx="24" cy="24" r="20"/>
              <circle class="timer-fg" id="timer-circle" cx="24" cy="24" r="20"
                stroke-dasharray="125.66" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-text" id="timer-num">30</div>
          </div>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options" id="q-options"></div>
        <div id="answered-notice" class="answered-notice" style="display:none">
          ✅ 已提交答案，等待本轮结束…
        </div>
      </div>

      <!-- Board -->
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">游戏棋盘</div>
        <div id="start-area" class="start-area"></div>
        <div class="board-wrap">
          <div id="board-container" class="board"></div>
        </div>
      </div>
    </div>

    <!-- Right: mini scoreboard -->
    <div class="game-right">
      <div class="card">
        <div class="card-title">当前排名</div>
        <div id="mini-scoreboard" class="mini-board"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Game Over ────────────────────────────────────────────────────────────── -->
<div id="view-gameover" class="view center">
  <div style="width:100%;max-width:480px">
    <div class="text-center mb-8">
      <div style="font-size:2.5rem">🏆</div>
      <div class="logo">最终排行榜</div>
    </div>
    <div id="final-leaderboard" class="leaderboard"></div>
    <button class="btn btn-ghost btn-full mt-16" onclick="location.reload()">再玩一局</button>
  </div>
</div>

<!-- ── Round Result Overlay ──────────────────────────────────────────────── -->
<div id="result-overlay" class="result-overlay" style="display:none">
  <div class="result-card">
    <div id="result-my-section"></div>
    <div class="result-others-title mt-12">本轮所有玩家</div>
    <div id="result-others"></div>
    <div class="text-center text-muted text-sm mt-12 pulse">下一题即将开始…</div>
  </div>
</div>

<!-- ── Surprise Toast ────────────────────────────────────────────────────── -->
<div id="surprise-toast" class="surprise-toast">⭐ 恭喜获得惊喜奖励！</div>

<script src="/socket.io/socket.io.js"></script>
<script src="player.js"></script>
</body>
</html>
