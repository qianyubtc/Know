<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Board Game - Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── JOIN VIEW ──────────────────────────────────────────────────────────── -->
<div id="view-join" class="view active">
  <div class="join-logo">🎲</div>
  <div class="join-title">Trivia Board Game</div>
  <div class="join-sub">多人答题棋盘游戏</div>
  <div class="card join-card">
    <div class="form-group">
      <label for="inp-room">房间 ID</label>
      <input id="inp-room" class="input" type="text" placeholder="输入房间ID" maxlength="10" style="text-transform:uppercase;">
    </div>
    <div class="form-group">
      <label for="inp-uid">Binance UID</label>
      <input id="inp-uid" class="input" type="text" placeholder="输入你的Binance UID">
    </div>
    <div class="form-group">
      <label for="inp-pw">6位重连密码</label>
      <input id="inp-pw" class="input" type="password" placeholder="设置6位数字密码" maxlength="6" inputmode="numeric" pattern="[0-9]{6}">
    </div>
    <button id="btn-join" class="btn btn-primary btn-lg w-full">加入游戏</button>
    <p id="join-error" class="text-muted mt-2 text-center hidden" style="color:var(--danger);"></p>
  </div>
</div>

<!-- ── WAITING VIEW ────────────────────────────────────────────────────────── -->
<div id="view-waiting" class="view">
  <div class="waiting-inner">
    <div style="font-size:2.5rem">🎲</div>
    <h2 style="margin-top:0.5rem">等待游戏开始</h2>
    <p class="text-muted mt-2" id="wait-room-info">房间 ID: —</p>
    <div class="waiting-spinner"></div>
    <p class="text-muted" id="wait-uid-info">你的UID: —</p>
    <div id="wait-player-list" class="player-list"></div>
    <p class="text-muted mt-4" style="font-size:0.85rem">等待管理员开始游戏…</p>
  </div>
</div>

<!-- ── GAME VIEW ───────────────────────────────────────────────────────────── -->
<div id="view-game" class="view">
  <div class="game-layout">
    <div class="game-top" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
      <div style="font-weight:700;font-size:1rem;">🎲 Trivia Board Game
        <span id="game-room-badge" class="badge badge-info" style="margin-left:0.4rem;"></span>
      </div>
      <div id="game-status-bar" class="text-muted" style="font-size:0.85rem;"></div>
    </div>

    <div class="game-board-area">
      <!-- Board -->
      <div class="board-container">
        <div id="player-board"></div>
      </div>

      <!-- Question card -->
      <div class="question-card" id="question-card">
        <div id="state-idle" style="text-align:center;padding:2rem;color:var(--text-muted);">
          <div style="font-size:2rem;">⏳</div>
          <p>等待下一题…</p>
        </div>

        <div id="state-question" class="hidden">
          <div class="question-header">
            <span id="q-round-label" class="question-round">第 — 题</span>
            <div class="countdown-wrap">
              <svg class="countdown-svg" width="40" height="40">
                <circle cx="20" cy="20" r="16" fill="none" stroke="var(--border)" stroke-width="3"/>
                <circle id="countdown-circle" class="countdown-circle" cx="20" cy="20" r="16"
                  fill="none" stroke="var(--primary)" stroke-width="3"
                  stroke-dasharray="100.53" stroke-dashoffset="0" stroke-linecap="round"/>
              </svg>
              <span id="countdown-num" class="countdown-num">—</span>
            </div>
          </div>
          <div id="q-text" class="question-text"></div>
          <div id="q-options" class="options-grid"></div>
          <div class="submit-area">
            <button id="btn-submit" class="btn btn-primary">确认答案</button>
            <div id="answered-badge" class="answered-badge hidden">✅ 已提交</div>
          </div>
        </div>

        <div id="state-result" class="hidden">
          <div id="result-reveal" class="result-reveal"></div>
        </div>
      </div>
    </div>

    <div class="game-sidebar">
      <div class="scoreboard-card">
        <div class="scoreboard-title">📊 排行榜</div>
        <div id="mini-scoreboard"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── GAME OVER VIEW ──────────────────────────────────────────────────────── -->
<div id="view-gameover" class="view">
  <div class="gameover-inner">
    <div class="gameover-title">🏆 游戏结束!</div>
    <div id="gameover-leaderboard" class="leaderboard-list"></div>
    <div id="gameover-lucky" class="lucky-section hidden">
      <h3>⭐ 幸运玩家</h3>
      <div id="lucky-list"></div>
    </div>
    <button id="btn-play-again" class="btn btn-primary mt-4">再玩一次</button>
  </div>
</div>

<!-- ── DICE OVERLAY ────────────────────────────────────────────────────────── -->
<div id="dice-overlay" class="dice-overlay hidden">
  <div id="dice-box" class="dice-box">🎲</div>
  <div id="dice-label" class="dice-label">掷骰子…</div>
</div>

<!-- ── Toast Container ────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script src="board.js"></script>
<script src="player.js"></script>
</body>
</html>
